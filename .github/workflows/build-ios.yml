name: Build iOS IPA

# ============================================================
# iOS 构建工作流
# ============================================================
# 支持两种构建模式:
# 1. 模拟器构建 (simulator) — 无需签名，默认模式，适合 CI 验证
# 2. 真机构建 (device) — 需要 Apple 开发者账号，产生可安装的 IPA
#
# 所需 Secrets（仅真机构建需要）:
#   APPLE_TEAM_ID           — Apple Developer Team ID（10位字符）
#   APPLE_CERTIFICATE_BASE64 — P12 证书的 Base64
#   APPLE_CERTIFICATE_PASSWORD — P12 证书密码
#   APPLE_PROVISIONING_PROFILE_BASE64 — Provisioning Profile 的 Base64
#   KEYCHAIN_PASSWORD       — 临时 keychain 密码（可选，有默认值）
# ============================================================

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: '构建类型'
        required: true
        type: choice
        default: 'simulator'
        options:
          - simulator
          - device
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'src-tauri/src/**'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'src-tauri/tauri.conf.json'
      - 'src-tauri/capabilities/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-ios.yml'

permissions:
  contents: read

env:
  # 推送到 master 时的默认构建类型
  CI_BUILD_TYPE: ${{ github.event.inputs.build-type || 'simulator' }}

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # ============================================================
      # 初始化 iOS Xcode 项目
      # ============================================================
      - name: Initialize iOS Xcode project
        run: |
          if [ -d "src-tauri/gen/apple" ]; then
            echo "✅ iOS Xcode project already exists"
          else
            echo "📱 Creating iOS Xcode project..."
            cd src-tauri
            npx tauri ios init
            echo "✅ Created"
            ls -la gen/apple/
          fi

      # ============================================================
      # 模拟器构建（无签名）
      # ============================================================
      - name: Build for iOS Simulator
        if: env.CI_BUILD_TYPE == 'simulator'
        run: |
          echo "📱 Building for iOS Simulator (no signing needed)..."
          npx tauri ios build -- \
            -- -destination 'generic/platform=iOS Simulator' \
               CODE_SIGN_IDENTITY="" \
               CODE_SIGNING_REQUIRED=NO
          echo "✅ Simulator build completed"

      - name: Upload Simulator .app
        if: env.CI_BUILD_TYPE == 'simulator'
        uses: actions/upload-artifact@v4
        with:
          name: YDL-GUI-iOS-Simulator
          path: |
            src-tauri/gen/apple/build/**/*.app
          retention-days: 14

      # ============================================================
      # 真机构建（需要签名）
      # ============================================================
      - name: Setup code signing for device build
        if: env.CI_BUILD_TYPE == 'device'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary-keychain-password' }}
        run: |
          echo "🔐 Configuring code signing..."

          # 创建临时 keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 导入 P12 证书
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # 安装 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/tauri.mobileprovision

          echo "✅ Code signing configured"

      - name: Build for iOS Device
        if: env.CI_BUILD_TYPE == 'device'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "📱 Building for iOS Device..."

          # 配置 Xcode 项目的签名设置
          if [ -f "src-tauri/gen/apple/"*.xcodeproj/project.pbxproj ]; then
            echo "🔧 Configuring Xcode project signing..."
            cd src-tauri/gen/apple
            PROJECT_FILE=$(find . -name "project.pbxproj" -path "*.xcodeproj/*" | head -1)

            if [ -n "$PROJECT_FILE" ]; then
              # 替换自动签名设置为手动指定 Team ID
              sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = \"$DEVELOPMENT_TEAM\";/g" "$PROJECT_FILE"
              sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
            fi
            cd ../..
          fi

          # 使用 tauri ios build 构建
          npx tauri ios build --target aarch64-apple-ios

          echo "✅ Device build completed"

      - name: Upload IPA (device build)
        if: env.CI_BUILD_TYPE == 'device'
        uses: actions/upload-artifact@v4
        with:
          name: YDL-GUI-iOS-IPA
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          retention-days: 30

      # ============================================================
      # 验证构建产物
      # ============================================================
      - name: Verify build
        run: |
          echo "📋 Build output:"
          find src-tauri/gen/apple/build -type f 2>/dev/null | head -20 || echo "No build artifacts found"
          if [ "$CI_BUILD_TYPE" = "device" ]; then
            find src-tauri/gen/apple/build -name "*.ipa" -exec echo "📦 IPA: {}" \; 2>/dev/null || echo "⚠️  No IPA found"
          else
            find src-tauri/gen/apple/build -name "*.app" -exec echo "📱 App: {}" \; 2>/dev/null || echo "⚠️  No .app found"
          fi
